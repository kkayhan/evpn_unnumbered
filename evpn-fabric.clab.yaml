name: evpn-fabric
prefix: ""

# ---------------------------------------------------------------------------
# 2x spine (7220 IXR-H2) / 3x data-leaf (7220 IXR-D2L) / 2x OOB-leaf
# (7220 IXR-D1 + 7215 IXS-A1). Fabric = eBGP IPv6-unnumbered carrying
# ipv4-unicast (loopbacks) + EVPN. System loopbacks from 10.10.10.0/24,
# last octet = the ".X" from the design diagram.
# Compute/VR hosts + MGMT hosts are network-multitool containers.
# ---------------------------------------------------------------------------
topology:
  defaults:
    kind: nokia_srlinux
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:26.3.2
    linux:
      image: ghcr.io/srl-labs/network-multitool:latest

  nodes:
    # ---------------- Spines (7220 IXR-H2) ----------------
    rack1-data-spine1:               # .16
      type: ixr-h2
      startup-config: ./configs/startup_configs/rack1-data-spine1.cfg
    rack2-data-spine1:               # .17
      type: ixr-h2
      startup-config: ./configs/startup_configs/rack2-data-spine1.cfg

    # ---------------- Data leaves (7220 IXR-D2L) ----------------
    rack1-data-leaf1:                # .13  (VTEP + OOB local bridge)
      type: ixr-d2l
      startup-config: ./configs/startup_configs/rack1-data-leaf1.cfg
    rack1-data-leaf2:                # .14  (VTEP, ESI pair partner of leaf1)
      type: ixr-d2l
      startup-config: ./configs/startup_configs/rack1-data-leaf2.cfg
    rack2-data-leaf1:                # .15  (VTEP)
      type: ixr-d2l
      startup-config: ./configs/startup_configs/rack2-data-leaf1.cfg

    # ---------------- OOB leaves (pure transparent L2, no BGP) ----------------
    rack1-oob-leaf1:                 # .11  7220 IXR-D1
      type: ixr-d1
      startup-config: ./configs/startup_configs/rack1-oob-leaf1.cfg
    rack2-oob-leaf1:                 # .12  7215 IXS-A1
      type: ixs-a1
      startup-config: ./configs/startup_configs/rack2-oob-leaf1.cfg

    # ---------------- Compute / VR hosts (multitool) ----------------
    # Rack1: dual-homed to leaf1+leaf2 via LACP bond (EVPN all-active ESI)
    srv1-1:
      kind: linux
      exec:
        - ip link set eth1 down
        - ip link set eth2 down
        - ip link add bond0 type bond mode 802.3ad miimon 100 lacp_rate fast
        - ip link set eth1 master bond0
        - ip link set eth2 master bond0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set bond0 up
        - ip addr add 192.0.2.11/24 dev bond0
        - ip route add 192.0.3.0/24 via 192.0.2.254
    vrrp-1:
      kind: linux
      exec:
        - ip link set eth1 down
        - ip link set eth2 down
        - ip link add bond0 type bond mode 802.3ad miimon 100 lacp_rate fast
        - ip link set eth1 master bond0
        - ip link set eth2 master bond0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set bond0 up
        - ip addr add 192.0.2.12/24 dev bond0
        - ip route add 192.0.3.0/24 via 192.0.2.254
    # Rack2: single-homed to rack2-data-leaf1
    vrrp-2:
      kind: linux
      exec:
        - ip addr add 192.0.3.11/24 dev eth1
        - ip link set eth1 up
        - ip route add 192.0.2.0/24 via 192.0.3.254
    srv2-1:
      kind: linux
      exec:
        - ip addr add 192.0.3.12/24 dev eth1
        - ip link set eth1 up
        - ip route add 192.0.2.0/24 via 192.0.3.254
    srv2-2:
      kind: linux
      exec:
        - ip addr add 192.0.3.13/24 dev eth1
        - ip link set eth1 up
        - ip route add 192.0.2.0/24 via 192.0.3.254

    # ---------------- MGMT hosts (pure L2 via OOB leaves -> leaf1 local bridge) ----------------
    mgmt-1a:
      kind: linux
      exec:
        - ip addr add 192.168.99.11/24 dev eth1
        - ip link set eth1 up
    mgmt-1b:
      kind: linux
      exec:
        - ip addr add 192.168.99.12/24 dev eth1
        - ip link set eth1 up

  links:
    # ---- Spine <-> Leaf (leaf uplink: e1-55 -> spine1, e1-56 -> spine2) ----
    - endpoints: ["rack1-data-spine1:e1-1", "rack1-data-leaf1:e1-55"]
    - endpoints: ["rack1-data-spine1:e1-2", "rack1-data-leaf2:e1-55"]
    - endpoints: ["rack1-data-spine1:e1-3", "rack2-data-leaf1:e1-55"]
    - endpoints: ["rack2-data-spine1:e1-1", "rack1-data-leaf1:e1-56"]
    - endpoints: ["rack2-data-spine1:e1-2", "rack1-data-leaf2:e1-56"]
    - endpoints: ["rack2-data-spine1:e1-3", "rack2-data-leaf1:e1-56"]

    # ---- OOB leaves -> data-leaf1 ----
    - endpoints: ["rack1-oob-leaf1:e1-49", "rack1-data-leaf1:e1-3"]
    - endpoints: ["rack2-oob-leaf1:e1-49", "rack1-data-leaf1:e1-4"]
    # ---- MGMT hosts -> OOB leaves ----
    - endpoints: ["mgmt-1a:eth1", "rack1-oob-leaf1:e1-1"]
    - endpoints: ["mgmt-1b:eth1", "rack2-oob-leaf1:e1-1"]

    # ---- Rack1 dual-homed compute (bond across leaf1 + leaf2) ----
    - endpoints: ["srv1-1:eth1", "rack1-data-leaf1:e1-1"]
    - endpoints: ["srv1-1:eth2", "rack1-data-leaf2:e1-1"]
    - endpoints: ["vrrp-1:eth1", "rack1-data-leaf1:e1-2"]
    - endpoints: ["vrrp-1:eth2", "rack1-data-leaf2:e1-2"]

    # ---- Rack2 single-homed compute ----
    - endpoints: ["vrrp-2:eth1", "rack2-data-leaf1:e1-1"]
    - endpoints: ["srv2-1:eth1", "rack2-data-leaf1:e1-2"]
    - endpoints: ["srv2-2:eth1", "rack2-data-leaf1:e1-3"]
