# =====================================================================
# rack2-data-leaf1  (7220 IXR-D2L, system .15)   ASN 65115
# Role: VTEP leaf (rack2, single-homed hosts).
#   e1-1 -> vrrp-2  |  e1-2 -> srv2-1  |  e1-3 -> srv2-2
#   e1-55 -> spine1 |  e1-56 -> spine2
# Tenant: macvrf-rack2 (L2 VNI 120, 192.0.3.0/24) + ipvrf-tenant (L3 VNI 100)
# =====================================================================

# ---- baseline ----
set / system mtu default-ip-mtu 9000

# ---- system loopback ----
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.10.10.15/32
set / bfd subinterface system0.0 admin-state enable

# ---- fabric uplinks (IPv6 unnumbered) ----
set / interface ethernet-1/55 admin-state enable
set / interface ethernet-1/55 subinterface 1 ipv6 admin-state enable
set / interface ethernet-1/55 subinterface 1 ipv6 router-advertisement router-role admin-state enable
set / interface ethernet-1/55 subinterface 1 ipv6 router-advertisement router-role min-advertisement-interval 4
set / interface ethernet-1/55 subinterface 1 ipv6 router-advertisement router-role max-advertisement-interval 10
set / bfd subinterface ethernet-1/55.1 admin-state enable
set / interface ethernet-1/56 admin-state enable
set / interface ethernet-1/56 subinterface 1 ipv6 admin-state enable
set / interface ethernet-1/56 subinterface 1 ipv6 router-advertisement router-role admin-state enable
set / interface ethernet-1/56 subinterface 1 ipv6 router-advertisement router-role min-advertisement-interval 4
set / interface ethernet-1/56 subinterface 1 ipv6 router-advertisement router-role max-advertisement-interval 10
set / bfd subinterface ethernet-1/56.1 admin-state enable

# ---- default network-instance ----
set / network-instance default ip-forwarding receive-ipv4-check false
set / network-instance default interface system0.0
set / network-instance default interface ethernet-1/55.1
set / network-instance default interface ethernet-1/56.1

# ---- export policy to advertise system loopback (VTEP) ----
set / routing-policy policy announce_system_IP statement 1 match protocol local
set / routing-policy policy announce_system_IP statement 1 action policy-result accept

# ---- BGP: eBGP IPv6-unnumbered + EVPN ----
set / network-instance default protocols bgp autonomous-system 65115
set / network-instance default protocols bgp router-id 10.10.10.15
set / network-instance default protocols bgp ebgp-default-policy import-reject-all false
set / network-instance default protocols bgp ebgp-default-policy export-reject-all false
set / network-instance default protocols bgp route-advertisement rapid-withdrawal true

set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp afi-safi ipv4-unicast export-policy [ announce_system_IP ]
set / network-instance default protocols bgp afi-safi ipv4-unicast multipath ebgp maximum-paths 64
set / network-instance default protocols bgp afi-safi ipv4-unicast multipath allow-multiple-as true

set / network-instance default protocols bgp afi-safi evpn admin-state enable
set / network-instance default protocols bgp afi-safi evpn evpn rapid-update true
set / network-instance default protocols bgp afi-safi evpn evpn inter-as-vpn true
set / network-instance default protocols bgp afi-safi evpn add-paths receive true
set / network-instance default protocols bgp afi-safi evpn add-paths send true
set / network-instance default protocols bgp afi-safi evpn add-paths send-max 16
set / network-instance default protocols bgp afi-safi evpn multipath ebgp maximum-paths 16
set / network-instance default protocols bgp afi-safi evpn multipath allow-multiple-as true

set / network-instance default protocols bgp group fabric
set / network-instance default protocols bgp group fabric afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp group fabric afi-safi evpn admin-state enable
set / network-instance default protocols bgp group fabric failure-detection enable-bfd true

set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/55.1 peer-group fabric
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/55.1 allowed-peer-as [ 65100 ]
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/56.1 peer-group fabric
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/56.1 allowed-peer-as [ 65100 ]

# =====================================================================
# Access ports (untagged, single-homed)
# =====================================================================
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 vlan-tagging false
set / interface ethernet-1/1 subinterface 0 type bridged
set / interface ethernet-1/1 subinterface 0 admin-state enable
set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 vlan-tagging false
set / interface ethernet-1/2 subinterface 0 type bridged
set / interface ethernet-1/2 subinterface 0 admin-state enable
set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 vlan-tagging false
set / interface ethernet-1/3 subinterface 0 type bridged
set / interface ethernet-1/3 subinterface 0 admin-state enable

# =====================================================================
# IRB anycast gateway for rack2 tenant BD
# =====================================================================
set / interface irb0 subinterface 1 admin-state enable
set / interface irb0 subinterface 1 ipv4 admin-state enable
set / interface irb0 subinterface 1 ipv4 address 192.0.3.254/24 anycast-gw true
set / interface irb0 subinterface 1 anycast-gw virtual-router-id 1
set / interface irb0 subinterface 1 anycast-gw anycast-gw-mac 00:00:00:01:01:20
set / interface irb0 subinterface 1 ipv4 arp learn-unsolicited true
set / interface irb0 subinterface 1 ipv4 arp evpn advertise dynamic

# =====================================================================
# VXLAN tunnel interfaces
# =====================================================================
set / tunnel-interface vxlan0 vxlan-interface 120 type bridged
set / tunnel-interface vxlan0 vxlan-interface 120 ingress vni 120
set / tunnel-interface vxlan0 vxlan-interface 120 egress source-ip use-system-ipv4-address
set / tunnel-interface vxlan0 vxlan-interface 100 type routed
set / tunnel-interface vxlan0 vxlan-interface 100 ingress vni 100
set / tunnel-interface vxlan0 vxlan-interface 100 egress source-ip use-system-ipv4-address

# =====================================================================
# L2 mac-vrf (rack2 compute BD, EVI/L2VNI 120)
# =====================================================================
set / network-instance macvrf-rack2 type mac-vrf
set / network-instance macvrf-rack2 admin-state enable
set / network-instance macvrf-rack2 interface ethernet-1/1.0
set / network-instance macvrf-rack2 interface ethernet-1/2.0
set / network-instance macvrf-rack2 interface ethernet-1/3.0
set / network-instance macvrf-rack2 interface irb0.1
set / network-instance macvrf-rack2 vxlan-interface vxlan0.120
set / network-instance macvrf-rack2 protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance macvrf-rack2 protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan0.120
set / network-instance macvrf-rack2 protocols bgp-evpn bgp-instance 1 evi 120
set / network-instance macvrf-rack2 protocols bgp-evpn bgp-instance 1 ecmp 8
set / network-instance macvrf-rack2 protocols bgp-vpn bgp-instance 1 route-target export-rt target:65000:120
set / network-instance macvrf-rack2 protocols bgp-vpn bgp-instance 1 route-target import-rt target:65000:120

# =====================================================================
# L3 ip-vrf (tenant, symmetric IRB, EVI/L3VNI 100) — same RT as rack1
# =====================================================================
set / network-instance ipvrf-tenant type ip-vrf
set / network-instance ipvrf-tenant admin-state enable
set / network-instance ipvrf-tenant ip-forwarding receive-ipv4-check false
set / network-instance ipvrf-tenant interface irb0.1
set / network-instance ipvrf-tenant vxlan-interface vxlan0.100
set / network-instance ipvrf-tenant protocols bgp-evpn bgp-instance 1 admin-state enable
set / network-instance ipvrf-tenant protocols bgp-evpn bgp-instance 1 vxlan-interface vxlan0.100
set / network-instance ipvrf-tenant protocols bgp-evpn bgp-instance 1 evi 100
set / network-instance ipvrf-tenant protocols bgp-evpn bgp-instance 1 ecmp 8
set / network-instance ipvrf-tenant protocols bgp-vpn bgp-instance 1 route-target export-rt target:65000:100
set / network-instance ipvrf-tenant protocols bgp-vpn bgp-instance 1 route-target import-rt target:65000:100
