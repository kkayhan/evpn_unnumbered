# =====================================================================
# rack1-data-spine1  (7220 IXR-H2, system .16)
# Role: spine / pure EVPN transit (NOT a VTEP)
# Fabric: eBGP IPv6-unnumbered, AFIs ipv4-unicast (loopbacks) + evpn
# Downlinks: e1-1 -> rack1-data-leaf1, e1-2 -> rack1-data-leaf2,
#            e1-3 -> rack2-data-leaf1
# =====================================================================

# ---- baseline ----
set / system mtu default-ip-mtu 9000

# ---- system loopback ----
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.10.10.16/32
set / bfd subinterface system0.0 admin-state enable

# ---- fabric downlinks (IPv6 unnumbered, router-advertisement) ----
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv6 admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv6 router-advertisement router-role admin-state enable
set / interface ethernet-1/1 subinterface 1 ipv6 router-advertisement router-role min-advertisement-interval 4
set / interface ethernet-1/1 subinterface 1 ipv6 router-advertisement router-role max-advertisement-interval 10
set / bfd subinterface ethernet-1/1.1 admin-state enable

set / interface ethernet-1/2 admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv6 admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv6 router-advertisement router-role admin-state enable
set / interface ethernet-1/2 subinterface 1 ipv6 router-advertisement router-role min-advertisement-interval 4
set / interface ethernet-1/2 subinterface 1 ipv6 router-advertisement router-role max-advertisement-interval 10
set / bfd subinterface ethernet-1/2.1 admin-state enable

set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 subinterface 1 ipv6 admin-state enable
set / interface ethernet-1/3 subinterface 1 ipv6 router-advertisement router-role admin-state enable
set / interface ethernet-1/3 subinterface 1 ipv6 router-advertisement router-role min-advertisement-interval 4
set / interface ethernet-1/3 subinterface 1 ipv6 router-advertisement router-role max-advertisement-interval 10
set / bfd subinterface ethernet-1/3.1 admin-state enable

# ---- default network-instance ----
set / network-instance default ip-forwarding receive-ipv4-check false
set / network-instance default interface system0.0
set / network-instance default interface ethernet-1/1.1
set / network-instance default interface ethernet-1/2.1
set / network-instance default interface ethernet-1/3.1

# ---- export policy to advertise system loopback ----
set / routing-policy policy announce_system_IP statement 1 match protocol local
set / routing-policy policy announce_system_IP statement 1 action policy-result accept

# ---- BGP: eBGP IPv6-unnumbered + EVPN ----
set / network-instance default protocols bgp autonomous-system 65100
set / network-instance default protocols bgp router-id 10.10.10.16
set / network-instance default protocols bgp ebgp-default-policy import-reject-all false
set / network-instance default protocols bgp ebgp-default-policy export-reject-all false
set / network-instance default protocols bgp route-advertisement rapid-withdrawal true

set / network-instance default protocols bgp afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp afi-safi ipv4-unicast export-policy [ announce_system_IP ]
set / network-instance default protocols bgp afi-safi ipv4-unicast multipath ebgp maximum-paths 64
set / network-instance default protocols bgp afi-safi ipv4-unicast multipath allow-multiple-as true

set / network-instance default protocols bgp afi-safi evpn admin-state enable
set / network-instance default protocols bgp afi-safi evpn evpn rapid-update true
set / network-instance default protocols bgp afi-safi evpn evpn inter-as-vpn true
set / network-instance default protocols bgp afi-safi evpn add-paths receive true
set / network-instance default protocols bgp afi-safi evpn add-paths send true
set / network-instance default protocols bgp afi-safi evpn add-paths send-max 16
set / network-instance default protocols bgp afi-safi evpn multipath ebgp maximum-paths 16
set / network-instance default protocols bgp afi-safi evpn multipath allow-multiple-as true

set / network-instance default protocols bgp group fabric
set / network-instance default protocols bgp group fabric afi-safi ipv4-unicast admin-state enable
set / network-instance default protocols bgp group fabric afi-safi evpn admin-state enable
set / network-instance default protocols bgp group fabric failure-detection enable-bfd true

set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/1.1 peer-group fabric
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/1.1 allowed-peer-as [ 1..4294967295 ]
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/2.1 peer-group fabric
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/2.1 allowed-peer-as [ 1..4294967295 ]
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/3.1 peer-group fabric
set / network-instance default protocols bgp dynamic-neighbors interface ethernet-1/3.1 allowed-peer-as [ 1..4294967295 ]
