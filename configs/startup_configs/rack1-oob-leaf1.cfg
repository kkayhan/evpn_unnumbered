# =====================================================================
# rack1-oob-leaf1  (7220 IXR-D1, system .11)
# Role: PURE transparent L2. No BGP / no EVPN / no VXLAN.
#   e1-1  -> MGMT-1a host
#   e1-49 -> rack1-data-leaf1:e1-3
# Bridges the MGMT host transparently up to data-leaf1.
# =====================================================================

# ---- baseline ----
set / system mtu default-ip-mtu 9000

# ---- system loopback (address only; not used for routing) ----
set / interface system0 subinterface 0 admin-state enable
set / interface system0 subinterface 0 ipv4 admin-state enable
set / interface system0 subinterface 0 ipv4 address 10.10.10.11/32

# ---- access + uplink ports (untagged, bridged) ----
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/1 vlan-tagging false
set / interface ethernet-1/1 subinterface 0 type bridged
set / interface ethernet-1/1 subinterface 0 admin-state enable
set / interface ethernet-1/49 admin-state enable
set / interface ethernet-1/49 vlan-tagging false
set / interface ethernet-1/49 subinterface 0 type bridged
set / interface ethernet-1/49 subinterface 0 admin-state enable

# ---- transparent L2 bridge ----
set / network-instance mgmt-bridge type mac-vrf
set / network-instance mgmt-bridge admin-state enable
set / network-instance mgmt-bridge interface ethernet-1/1.0
set / network-instance mgmt-bridge interface ethernet-1/49.0
